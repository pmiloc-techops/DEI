<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEI Events</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: transparent;
      line-height: 1.6;
    }
    #filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0px;
      padding: 10px;
      justify-content: left;
    }
    .filter-btn {
      padding: 0.5rem 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f5f5f5;
      cursor: pointer;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
    }
    .filter-btn.active { background: #e0f7fa; }
    #event-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 10px;
    }
    .event-card {
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
    }
    .event-title {
      margin: 0;
      font-size: 18px;
      font-weight: normal;
      color: #000;
    }
    .status-msg { color: #333; font-size: 14px; }
    .error-msg  { color: #c00; font-size: 14px; }
  </style>
</head>
<body>
  <div id="filter-bar"></div>
  <div id="event-container">
    <p class="status-msg">Loading events...</p>
  </div>
  <script>
    const FEED_URL = "https://raw.githubusercontent.com/pmiloc-techops/DEI/main/dei-data.json";

    function renderFilters(themes) {
      const bar = document.getElementById("filter-bar");
      const all = ["All", ...themes];
      bar.innerHTML = all.map((t, i) => `
        <button class="filter-btn ${i === 0 ? 'active' : ''}" data-theme="${t}">${t}</button>
      `).join("");
      bar.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          bar.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          const selected = btn.dataset.theme;
          document.querySelectorAll(".event-card").forEach(card => {
            card.style.display =
              (selected === "All" || card.dataset.theme === selected) ? "" : "none";
          });
        });
      });
    }

    fetch(FEED_URL)
      .then(r => r.json())
      .then(data => {
        const events = data.events;
        const container = document.getElementById("event-container");
        if (!events.length) {
          container.innerHTML = "<p class='status-msg'>No upcoming events.</p>";
          document.getElementById("filter-bar").style.display = "none";
          return;
        }
        const themes = [...new Set(events.map(e => e.theme).filter(Boolean))];
        renderFilters(themes);
        container.innerHTML = events.map(ev => `
          <div class="event-card" data-theme="${ev.theme}">
            <h3 class="event-title">${ev.date} — ${ev.title}</h3>
          </div>
        `).join("");
      })
      .catch(() => {
        document.getElementById("event-container").innerHTML =
          "<p class='error-msg'>Unable to load events. Please try again later.</p>";
      });
  </script>
</body>
</html>
