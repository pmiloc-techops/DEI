<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEI Blogs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: transparent;
      padding: 0;
      line-height: 1.6;
    }
    .blog-card {
      margin-bottom: 15px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #f9f9f9;
    }
    .blog-title {
      margin: 0;
      color: #000000;
      font-size: 18px;
    }
    .blog-description {
      margin: 8px 0;
      font-size: 14px;
      color: #333;
    }
    .blog-link {
      color: #4f17a9;
      font-weight: bold;
      text-decoration: none;
      font-size: 14px;
    }
    .blog-link:hover { text-decoration: underline; }
    .status-msg { color: #333; font-size: 14px; }
    .error-msg  { color: #c00; font-size: 14px; }
  </style>
</head>
<body>
  <div id="blog-container">
    <p class="status-msg">Loading blogs...</p>
  </div>
  <script>
    const FEED_URL = "https://raw.githubusercontent.com/pmiloc-techops/DEI/main/dei-data.json";

    fetch(FEED_URL)
      .then(r => r.json())
      .then(data => {
        const blogs = data.blogs;
        const container = document.getElementById("blog-container");
        if (!blogs.length) {
          container.innerHTML = "<p class='status-msg'>No blogs posted yet.</p>";
          return;
        }
        container.innerHTML = blogs.map(blog => `
          <div class="blog-card">
            <h3 class="blog-title">${blog.title}</h3>
            <p class="blog-description">${blog.description}</p>
            ${blog.link ? `<a class="blog-link" href="${blog.link}" target="_blank" rel="noopener">Read More »</a>` : ""}
          </div>
        `).join("");
      })
      .catch(() => {
        document.getElementById("blog-container").innerHTML =
          "<p class='error-msg'>Unable to load blogs. Please try again later.</p>";
      });
  </script>
</body>
</html>
